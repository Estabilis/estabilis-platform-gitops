{{- /*
  Grafana Alloy (telemetry collector) for every workload cluster.

  Collects logs from all pods and metrics from kube-state-metrics,
  node-exporter, kubelet/cAdvisor, and annotation-discovered client
  pods. Pushes to the hub's Loki and Mimir via HTTPS remote_write.

  Push URLs are derived dynamically from bridge annotations:
    LOKI_PUSH_URL  = https://loki.{hub-cluster-name}.{domain}/loki/api/v1/push
    MIMIR_PUSH_URL = https://mimir.{hub-cluster-name}.{domain}/api/v1/push
  The base River config reads these via sys.env() — no hardcoded URLs.

  Opt-in toggle: components.alloy
  Sync-wave 8 — after observability collectors (kube-state-metrics,
  node-exporter at wave 7) are available for scraping.
*/ -}}
{{- if index .Values.components "alloy" }}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: alloy
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            {{- toYaml .Values.clusterSelector.matchLabels | nindent 12 }}
  template:
    metadata:
      name: "alloy-{{ `{{ .name }}` }}"
      annotations:
        argocd.argoproj.io/sync-wave: "8"
      labels:
        estabilis.io/workload-cluster: "{{ `{{ .name }}` }}"
    spec:
      project: workload-baseline
      sources:
        - repoURL: https://grafana.github.io/helm-charts
          chart: alloy
          targetRevision: "1.6.2"
          helm:
            releaseName: "alloy"
            valueFiles:
              - $values/values/workload/alloy.yaml
              {{- include "workload-bootstrap.overrideValueFile" (dict "component" "alloy" "root" $) | nindent 14 }}
              {{- include "workload-bootstrap.gitopsValueFile" (dict "component" "alloy" "root" $) | nindent 14 }}
            {{- include "workload-bootstrap.ignoreMissingValueFiles" . | nindent 12 }}
            parameters:
              - name: alloy.extraEnv[0].name
                value: LOKI_PUSH_URL
              - name: alloy.extraEnv[0].value
                value: '{{ `{{ printf "https://loki.%s.%s/loki/api/v1/push" (index .metadata.annotations "estabilis.io/bridge.hub-cluster-name") (index .metadata.annotations "estabilis.io/bridge.domain") }}` }}'
              - name: alloy.extraEnv[1].name
                value: MIMIR_PUSH_URL
              - name: alloy.extraEnv[1].value
                value: '{{ `{{ printf "https://mimir.%s.%s/api/v1/push" (index .metadata.annotations "estabilis.io/bridge.hub-cluster-name") (index .metadata.annotations "estabilis.io/bridge.domain") }}` }}'
              - name: alloy.extraEnv[2].name
                value: CLUSTER_NAME
              - name: alloy.extraEnv[2].value
                value: '{{ `{{ .name }}` }}'
              {{- include "workload-bootstrap.provenanceParameters" $ | nindent 14 }}
        - repoURL: {{ .Values.repoURL | quote }}
          targetRevision: {{ .Values.repoVersion | quote }}
          ref: values
        {{- include "workload-bootstrap.overrideSource" . | nindent 8 }}
        {{- include "workload-bootstrap.gitopsSource" . | nindent 8 }}
      destination:
        server: "{{ `{{ .server }}` }}"
        namespace: "alloy"
      syncPolicy:
        {{- include "workload-bootstrap.managedNamespaceMetadata" . | nindent 8 }}
        automated:
          selfHeal: true
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - CreateNamespace=true
{{- end }}
