# Source: kyverno-policies/templates/default-deny-network-policy.yaml
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: default-deny-network-policy
  annotations:
    policies.kyverno.io/title: Default Deny Network Policy
    policies.kyverno.io/description: >-
      Automatically generates a default-deny NetworkPolicy for each new
      namespace. This ensures zero-trust networking by default, requiring
      explicit NetworkPolicy rules to allow traffic.
spec:
  background: true
  rules:
    - name: generate-default-deny
      match:
        any:
          - resources:
              kinds:
                - Namespace

      exclude:
        any:
          - resources:
              names:
                - argocd
                - cert-manager
                - cnpg-system
                - external-dns
                - external-secrets
                - grafana
                - kube-node-lease
                - kube-public
                - kube-state-metrics
                - kube-system
                - kyverno
                - node-exporter
                - opencost
                - traefik
                - trivy-system
                - velero
      generate:
        generateExisting: true
        synchronize: true
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: default-deny-all
        namespace: "{{ request.object.metadata.name }}"
        data:
          spec:
            podSelector: {}
            policyTypes:
              - Ingress
              - Egress
