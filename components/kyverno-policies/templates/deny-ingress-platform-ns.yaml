{{- if .Values.policies.deny_ingress_platform_ns.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: deny-ingress-platform-ns
  labels:
    {{- include "estabilis.labels" . | nindent 4 }}
  annotations:
    {{- include "estabilis.annotations" . | nindent 4 }}
    policies.kyverno.io/title: Deny Ingress in Platform Namespaces
    policies.kyverno.io/description: >-
      Prevents creating Ingress resources in platform namespaces to avoid
      accidental exposure of internal APIs to the public internet.
      Platform ingress is managed exclusively by the upstream configuration.
spec:
  validationFailureAction: {{ .Values.policies.deny_ingress_platform_ns.action | default .Values.defaultAction | default "Audit" }}
  background: true
  rules:
    - name: deny-ingress-platform-namespaces
      match:
        any:
          - resources:
              kinds:
                - Ingress
              namespaces:
                - cert-manager
                - external-secrets
                - external-dns
                - kyverno
                - grafana
                - opencost
                - velero
                - trivy-system
                - cnpg-system
                - kube-state-metrics
                - node-exporter
                - policy-reporter
      # Platform-emitted Ingresses (via the ADR 0014 multi-exposure
      # charts: grafana-ingress, argocd-ingress, hubble-ui-ingress,
      # loki-ingress) are exempt — they all carry the standard S2
      # identity label app.kubernetes.io/part-of=estabilis-platform
      # rendered by the estabilis.labels helper (ADR 0003 §S2). The
      # deny rule still catches anything created accidentally by an
      # upstream chart sub-template or by a human operator, which is
      # what the policy is here to prevent.
      exclude:
        any:
          - resources:
              selector:
                matchLabels:
                  app.kubernetes.io/part-of: estabilis-platform
      validate:
        message: "Ingress resources are not allowed in platform namespaces. Platform ingress is managed by the upstream configuration."
        deny: {}
{{- end }}
