---
# =============================================================================
# cnpg-system namespace
# Needs broad egress: Azure Blob for WAL backup
# Ingress: webhook, operator status, replication, postgres clients
# =============================================================================
{{- if and (index .Values.policies "cnpg-system").enabled (ne (.Values.components.cnpg | toString) "false") }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cnpg-system
  namespace: cnpg-system
  {{- include "estabilis.metadata" . | nindent 2 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Webhook callbacks from API server (mutating/validating admission)
    - ports:
        - protocol: TCP
          port: 9443
    # Intra-namespace: operator → postgres status API (8000),
    # replication between primary and replicas (5432)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
    # PostgreSQL clients from grafana namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: grafana
      ports:
        - protocol: TCP
          port: 5432
  egress:
{{ include "network-policies.dns-egress" . }}
    # All egress (Azure Blob for WAL backup)
    - to: []
{{- end }}
---
