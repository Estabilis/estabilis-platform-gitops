# Platform overlay — node-exporter upstream chart values for the hub cluster
commonLabels:
  estabilis.io/managed-by: platform
  estabilis.io/component: node-exporter

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

tolerations:
  - key: "estabilis.io/workload-type"
    operator: "Equal"
    value: "platform"
    effect: "NoSchedule"
