# Workload overlay for external-secrets
# Note: commonLabels is NOT allowed by the upstream chart schema.
# Labels are set via serviceAccount.annotations (helm parameter).

# Azure Workload Identity — required for the AKS webhook to inject
# AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_FEDERATED_TOKEN_FILE into pods.
# The SA annotation (client-id) is set via ApplicationSet parameter from
# Cluster Secret annotations; the pod label (use: true) triggers the webhook.
serviceAccount:
  create: true
  annotations:
    azure.workload.identity/client-id: ""  # overridden by ApplicationSet parameter
podLabels:
  azure.workload.identity/use: "true"

replicaCount: 1

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  capabilities:
    drop: [ALL]
  seccompProfile:
    type: RuntimeDefault

resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 256Mi

webhook:
  replicaCount: 1
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    capabilities:
      drop: [ALL]
    seccompProfile:
      type: RuntimeDefault
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi

certController:
  replicaCount: 1
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    capabilities:
      drop: [ALL]
    seccompProfile:
      type: RuntimeDefault
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 128Mi
