# Source: kyverno-policies/templates/validate-namespace-name.yaml
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: validate-namespace-name
  annotations:
    policies.kyverno.io/title: Validate Namespace Name
    policies.kyverno.io/description: >-
      Validates that namespace names follow the convention of lowercase
      alphanumeric characters and hyphens only. This prevents naming
      inconsistencies and avoids issues with DNS-based service discovery.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-namespace-name
      match:
        any:
          - resources:
              kinds:
                - Namespace

      exclude:
        any:
          - resources:
              names:
                - argocd
                - cert-manager
                - cnpg-system
                - external-dns
                - external-secrets
                - grafana
                - kube-node-lease
                - kube-public
                - kube-state-metrics
                - kube-system
                - kyverno
                - node-exporter
                - opencost
                - traefik
                - trivy-system
                - velero
      validate:
        message: "Namespace name must be lowercase alphanumeric with hyphens only (regex: ^[a-z0-9]([a-z0-9-]*[a-z0-9])?$)."
        deny:
          conditions:
            any:
              - key: "{{ regex_match('^[a-z0-9]([a-z0-9-]*[a-z0-9])?$', request.object.metadata.name) }}"
                operator: NotEquals
                value: true
