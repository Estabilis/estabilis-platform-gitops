# Network policy allow rules per namespace
# Override via downstream overrides/network-policies/values.yaml
#
# Every namespace has a deny-all NetworkPolicy from Kyverno.
# This component creates allow rules for legitimate traffic.
# All pods need DNS egress (port 53 to kube-dns).
#
# Component-aware gating (ADR 0009):
# Each policy is gated by BOTH policies.{ns}.enabled AND components.{ns}.
# On the platform hub, components.* defaults to true (all namespaces exist).
# On workload clusters, the workload-bootstrap ApplicationSet passes the
# active components map as helm parameters — only namespaces with active
# components get NetworkPolicies.

# Active components — passed automatically by workload-bootstrap.
# On the platform hub, everything defaults to true (no filtering).
components:
  grafana: true
  argocd: true
  cert-manager: true
  external-secrets: true
  external-dns: true
  cnpg: true
  kyverno: true
  traefik: true
  velero: true
  opencost: true
  trivy: true
  alloy: true
  kube-state-metrics: true
  node-exporter: true
  policy-reporter: true
  # AWS-only components — DEFAULT FALSE on purpose (defensive).
  # The platform-root Application templates (aws-load-balancer-controller.yaml,
  # karpenter.yaml, metrics-server.yaml in the upstream platform repo) gate
  # the Apps themselves on `global.provider == "aws"`, so the namespaces
  # never come into existence on Azure. To avoid this chart rendering
  # NetworkPolicies for non-existent namespaces, defaults are `false` here.
  # The upstream platform-root forwarding template (>= v0.27.0) only flips
  # them to `true` when provider = aws AND the relevant feature flag matches
  # (ingress_controller=alb for ALB controller, autoscaler=karpenter|hybrid
  # for karpenter; metrics-server is unconditional on AWS — Azure AKS provides
  # natively).
  aws-load-balancer-controller: false
  karpenter: false
  metrics-server: false

  # Multi-provider opt-in components — DEFAULT FALSE.
  # Vault is opt-in on either provider via `vault_enabled = true` in
  # terraform.tfvars. Auto-unseal differs per provider (AWS KMS / Azure
  # Key Vault) but the chart and triple-belt are identical.
  vault: false

policies:
  grafana:
    enabled: true
  argocd:
    enabled: true
  cert-manager:
    enabled: true
  external-secrets:
    enabled: true
  external-dns:
    enabled: true
  cnpg-system:
    enabled: true
  kyverno:
    enabled: true
  traefik:
    enabled: true
  velero:
    enabled: true
  opencost:
    enabled: true
  trivy-system:
    enabled: true
  alloy:
    enabled: true
  kube-state-metrics:
    enabled: true
  node-exporter:
    enabled: true
  policy-reporter:
    enabled: true
  aws-load-balancer-controller:
    enabled: true
  karpenter:
    enabled: true
  metrics-server:
    enabled: true
  vault:
    enabled: true

# Downstream escape hatch — additive NetworkPolicies declared by the client.
#
# Built-in policies above are static and curated by the platform. When a
# client needs extra permissions (a custom app namespace, an extra ingress
# port, an egress to a specific CIDR), declare them here instead of forking
# the platform repo.
#
# NetworkPolicies are additive in Kubernetes (multiple policies in the same
# namespace are OR'd), so adding permissions = adding a policy. Removing a
# permission from a built-in requires an upstream change.
#
# Each entry must provide `name`, `namespace`, and `spec` (a full
# NetworkPolicy spec). The standard platform labels are added automatically.
#
# Example (downstream override):
#
#   extraPolicies:
#     - name: allow-app-foo-from-traefik
#       namespace: app-foo
#       spec:
#         podSelector: {}
#         policyTypes: [Ingress]
#         ingress:
#           - from:
#               - namespaceSelector:
#                   matchLabels:
#                     kubernetes.io/metadata.name: traefik
extraPolicies: []
