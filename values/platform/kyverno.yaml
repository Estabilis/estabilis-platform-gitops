# Platform overlay — Kyverno upstream chart values for the hub cluster
commonLabels:
  estabilis.io/managed-by: platform
  estabilis.io/component: kyverno

# Webhook hardening for batch policy deployment.
# forceFailurePolicyIgnore: all webhooks use Ignore instead of Fail.
# When the webhook times out, the request proceeds (policy still validated
# asynchronously by the background-controller). Prevents webhook failures
# from blocking ArgoCD sync operations.
features:
  forceFailurePolicyIgnore:
    enabled: true
