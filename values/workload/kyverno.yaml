# Workload overlay — Kyverno upstream chart values for workload clusters
commonLabels:
  estabilis.io/managed-by: workload-bootstrap
  estabilis.io/component: kyverno

# Namespace exclusion — namespaces with kyverno.io/exclude=true are
# completely ignored by Kyverno (no admission, validation, or mutation).
config:
  webhooks:
    namespaceSelector:
      matchExpressions:
        - key: kyverno.io/exclude
          operator: DoesNotExist

# Webhook hardening — forceFailurePolicyIgnore makes resource-validation
# webhooks use Ignore instead of Fail. Prevents webhook timeouts from
# blocking ArgoCD sync operations during batch policy deployment.
features:
  forceFailurePolicyIgnore:
    enabled: true

# 3 replicas per Kyverno scaling docs — the policy-validation webhook
# processes requests sequentially per pod. With 30 ClusterPolicies,
# 3 replicas distributes ~10 per pod within the 30s timeout.
# Ref: https://kyverno.io/docs/installation/scaling/
admissionController:
  replicas: 3
  container:
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      capabilities:
        drop: [ALL]
      seccompProfile:
        type: RuntimeDefault
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  metricsService:
    create: true

backgroundController:
  enabled: true
  backgroundScanInterval: 5m
  container:
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      capabilities:
        drop: [ALL]
      seccompProfile:
        type: RuntimeDefault
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi
  metricsService:
    create: true
  rbac:
    clusterRole:
      extraResources:
        - apiGroups: ["policy"]
          resources: ["poddisruptionbudgets"]
          verbs: ["create", "update", "delete", "get", "list"]
        - apiGroups: ["networking.k8s.io"]
          resources: ["networkpolicies"]
          verbs: ["create", "update", "delete", "get", "list"]
        - apiGroups: [""]
          resources: ["resourcequotas", "limitranges"]
          verbs: ["create", "update", "delete", "get", "list"]

cleanupController:
  enabled: true
  container:
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      capabilities:
        drop: [ALL]
      seccompProfile:
        type: RuntimeDefault
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 128Mi
  metricsService:
    create: true

reportsController:
  enabled: true
  container:
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      capabilities:
        drop: [ALL]
      seccompProfile:
        type: RuntimeDefault
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi
  metricsService:
    create: true

# Disable pre-delete hooks — they fail on clean installs because they
# reference the admission-controller ServiceAccount before the chart
# creates it. Webhook cleanup is handled by the resync nuke phase.
webhooksCleanup:
  enabled: false

grafana:
  enabled: false
