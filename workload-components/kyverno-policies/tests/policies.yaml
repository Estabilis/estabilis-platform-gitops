# Source: kyverno-policies/templates/block-client-in-platform-ns.yaml
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-client-in-platform-ns
  annotations:
    policies.kyverno.io/title: Block Client Deployments in Platform Namespaces
    policies.kyverno.io/description: >-
      Prevents workloads with estabilis.io/managed-by=client from being
      deployed in platform namespaces. Client apps must use app-* namespaces.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: block-client-deployments
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
              namespaces:
                - argocd
                - cert-manager
                - cnpg-system
                - external-dns
                - external-secrets
                - grafana
                - kube-node-lease
                - kube-public
                - kube-state-metrics
                - kyverno
                - node-exporter
                - opencost
                - traefik
                - trivy-system
                - velero
      validate:
        message: "Client workloads (estabilis.io/managed-by=client) cannot be deployed in platform namespaces. Use app-* namespaces."
        deny:
          conditions:
            any:
              - key: "{{ request.object.metadata.labels.\"estabilis.io/managed-by\" || '' }}"
                operator: Equals
                value: "client"
