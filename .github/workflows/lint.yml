name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  applicationset-templates:
    name: ApplicationSet goTemplate syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lint
        run: ./scripts/lint-applicationset-templates.sh

  helm-trim-markers:
    name: Helm trim-marker comments in YAML lists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lint
        run: ./scripts/lint-helm-trim-markers.sh

  ignore-missing-inline:
    name: Inline ignoreMissingValueFiles must use helper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lint
        run: ./scripts/lint-ignore-missing-inline.sh
