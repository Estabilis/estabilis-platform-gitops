{{- range $ns, $quota := .Values.namespaces }}
{{- $componentActive := true }}
{{- if hasKey $.Values.components $ns }}
{{- $componentActive = ne (index $.Values.components $ns | toString) "false" }}
{{- end }}
{{- if and $quota.enabled $componentActive }}
---
apiVersion: v1
kind: LimitRange
metadata:
  name: platform-limits-{{ $ns }}
  namespace: {{ $ns }}
  {{- include "estabilis.metadata" $ | nindent 2 }}
spec:
  limits:
    - type: Container
      {{- if $quota.limitRange }}
      default:
        {{- toYaml $quota.limitRange.default | nindent 8 }}
      defaultRequest:
        {{- toYaml $quota.limitRange.defaultRequest | nindent 8 }}
      max:
        {{- toYaml $quota.limitRange.max | nindent 8 }}
      {{- else }}
      default:
        {{- toYaml $.Values.defaults.limitRange.default | nindent 8 }}
      defaultRequest:
        {{- toYaml $.Values.defaults.limitRange.defaultRequest | nindent 8 }}
      max:
        {{- toYaml $.Values.defaults.limitRange.max | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
