{{- /*
  Kyverno namespace labels + PolicyException CRDs for every workload cluster.

  Opt-in toggle: components.kyverno-exceptions (flat boolean, mirrors
  platform-root convention).

  SINGLE SOURCE OF TRUTH. The chart in components/kyverno-exceptions is
  shared by both hub and workload clusters (ADR 0002 Phase 3). The
  values/workload/kyverno-exceptions.yaml overlay provides any workload-
  specific overrides.

  Used to:
    - Label pre-existing namespaces (e.g. kube-system) with
      kyverno.io/exclude=true so Kyverno skips them entirely.
    - Emit PolicyException CRDs for per-resource, per-policy escapes.

  Mirrors hub kyverno-exceptions Application exactly (sync-wave 4 —
  after policies, no automated sync).
*/ -}}
{{- if index .Values.components "kyverno-exceptions" }}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workload-kyverno-exceptions
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            {{- toYaml .Values.clusterSelector.matchLabels | nindent 12 }}
  template:
    metadata:
      name: "workload-kyverno-exceptions-{{ `{{name}}` }}"
      annotations:
        argocd.argoproj.io/sync-wave: "4"
      labels:
        estabilis.io/workload-cluster: "{{ `{{name}}` }}"
    spec:
      project: workload-baseline
      sources:
        - repoURL: {{ .Values.repoURL | quote }}
          targetRevision: {{ .Values.repoVersion | quote }}
          path: components/kyverno-exceptions
          helm:
            releaseName: "kyverno-exceptions"
            valueFiles:
              - $values/components/kyverno-exceptions/values.yaml
              - $values/values/workload/kyverno-exceptions.yaml
              {{- include "workload-bootstrap.overrideValueFile" (dict "component" "kyverno-exceptions" "root" $) | nindent 14 }}
              {{- include "workload-bootstrap.gitopsValueFile" (dict "component" "kyverno-exceptions" "root" $) | nindent 14 }}
            ignoreMissingValueFiles: true
            parameters:
              - name: global.environment
                value: {{ .Values.global.environment | quote }}
              {{- include "workload-bootstrap.provenanceParameters" $ | nindent 14 }}
        - repoURL: {{ .Values.repoURL | quote }}
          targetRevision: {{ .Values.repoVersion | quote }}
          ref: values
        # 3) Client override repo (conditional — only when configRepoUrl is set)
        {{- include "workload-bootstrap.overrideSource" . | nindent 8 }}
        {{- include "workload-bootstrap.gitopsSource" . | nindent 8 }}
      destination:
        server: "{{ `{{server}}` }}"
        namespace: "kyverno"
      syncPolicy:
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - ServerSideApply=true
{{- end }}
