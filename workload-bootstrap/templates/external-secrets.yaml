{{- /*
  External Secrets Operator bootstrap for every workload cluster
  registered by the estabilis-workload-operator.

  Opt-in toggle: components.external-secrets in workload-bootstrap/values.yaml
  (flat boolean, mirroring platform-root convention).

  The rendered ApplicationSet uses a clusters generator keyed off
  .Values.clusterSelector.matchLabels — the same label the operator
  writes on ArgoCD Cluster Secrets when it registers a workload.

  Multi-source Application:
    1) Upstream external-secrets chart (pinned version).
    2) This repo as $values — provides the overlay in
       values/workload/external-secrets.yaml.

  Sync-wave 3 — after cert-manager (wave 2) since external-secrets
  relies on cert-manager for webhook certificates.

  managedNamespaceMetadata mirrors platform-root.managedNamespaceMetadata
  and carries distinct platform-version (hub repo) and
  workload-bootstrap-version (this chart) for full provenance.
*/ -}}
{{- if index .Values.components "external-secrets" }}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workload-external-secrets
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            {{- toYaml .Values.clusterSelector.matchLabels | nindent 12 }}
  template:
    metadata:
      name: "workload-external-secrets-{{ `{{name}}` }}"
      annotations:
        argocd.argoproj.io/sync-wave: "3"
      labels:
        estabilis.io/workload-cluster: "{{ `{{name}}` }}"
    spec:
      project: default
      sources:
        # 1) Upstream chart from external-secrets.io
        - repoURL: "https://charts.external-secrets.io"
          chart: "external-secrets"
          targetRevision: "2.1.0"
          helm:
            releaseName: "external-secrets"
            valueFiles:
              - $values/values/workload/external-secrets.yaml
              {{- include "workload-bootstrap.overrideValueFile" (dict "component" "external-secrets" "root" $) | nindent 14 }}
              {{- include "workload-bootstrap.gitopsValueFile" (dict "component" "external-secrets" "root" $) | nindent 14 }}
            ignoreMissingValueFiles: true
            parameters:
              - name: global.environment
                value: {{ .Values.global.environment | quote }}
              - name: installCRDs
                value: "true"
              - name: serviceAccount.annotations.azure\.workload\.identity/client-id
                value: '{{ `{{metadata.annotations.estabilis-external-secrets-client-id}}` }}'
              {{- include "workload-bootstrap.provenanceParameters" $ | nindent 14 }}
        # 2) This repo as $values — provides the overlay for the upstream chart
        - repoURL: {{ .Values.repoURL | quote }}
          targetRevision: {{ .Values.repoVersion | quote }}
          ref: values
        # 3) Client override repo (conditional — only when configRepoUrl is set)
        {{- include "workload-bootstrap.overrideSource" . | nindent 8 }}
        {{- include "workload-bootstrap.gitopsSource" . | nindent 8 }}
      destination:
        server: "{{ `{{server}}` }}"
        namespace: "external-secrets"
      syncPolicy:
        {{- include "workload-bootstrap.managedNamespaceMetadata" . | nindent 8 }}
        automated:
          selfHeal: true
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
{{- end }}
