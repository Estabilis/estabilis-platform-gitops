# ============================================================================
# Kyverno values overlay — injected into the upstream Kyverno chart via the
# multi-source Application rendered by workload-bootstrap.
#
# Source: https://kyverno.github.io/kyverno (version pinned in
# workload-bootstrap/values.yaml → components.kyverno.chart.targetRevision)
#
# IMPORTANT: this file is kept in lockstep with the hub's
# estabilis-platform/core/components/kyverno/values.yaml. Any production
# hardening added there MUST be mirrored here so the workload cluster
# benefits from the same fixes (bitnami image migration, hook removals,
# webhook cleanup disabled, etc.).
#
# Reference: https://kyverno.github.io/kyverno/
# ============================================================================

# ----------------------------------------------------------------------------
# Estabilis branding — additive labels only (estabilis.io/*).
# Do NOT override app.kubernetes.io/* keys here — the Kyverno chart uses
# them to build immutable Deployment selectors.
# ----------------------------------------------------------------------------
customLabels:
  estabilis.io/managed-by: workload-bootstrap
  estabilis.io/component: kyverno
  estabilis.io/tier: workload-baseline
  estabilis.io/part-of: estabilis-platform

# ----------------------------------------------------------------------------
# Webhook exclusion — namespaces with label kyverno.io/exclude=true are
# completely ignored by Kyverno (no admission, no validation, no mutation).
# Same pattern as the hub for operator consistency.
# ----------------------------------------------------------------------------
config:
  webhooks:
    namespaceSelector:
      matchExpressions:
        - key: kyverno.io/exclude
          operator: DoesNotExist

# ----------------------------------------------------------------------------
# Controllers — production-hardened settings mirrored from the hub.
# ----------------------------------------------------------------------------
admissionController:
  replicas: 1
  container:
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      capabilities:
        drop: [ALL]
      seccompProfile:
        type: RuntimeDefault
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 512Mi
  metricsService:
    create: true

backgroundController:
  enabled: true
  backgroundScanInterval: 5m
  container:
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      capabilities:
        drop: [ALL]
      seccompProfile:
        type: RuntimeDefault
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi
  metricsService:
    create: true
  rbac:
    clusterRole:
      extraResources:
        - apiGroups: ["policy"]
          resources: ["poddisruptionbudgets"]
          verbs: ["create", "update", "delete", "get", "list"]
        - apiGroups: ["networking.k8s.io"]
          resources: ["networkpolicies"]
          verbs: ["create", "update", "delete", "get", "list"]
        - apiGroups: [""]
          resources: ["resourcequotas", "limitranges"]
          verbs: ["create", "update", "delete", "get", "list"]

cleanupController:
  enabled: true
  container:
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      capabilities:
        drop: [ALL]
      seccompProfile:
        type: RuntimeDefault
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 128Mi
  metricsService:
    create: true

reportsController:
  enabled: true
  container:
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      capabilities:
        drop: [ALL]
      seccompProfile:
        type: RuntimeDefault
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi
  metricsService:
    create: true

# ----------------------------------------------------------------------------
# CRITICAL: disable pre-delete / cleanup hooks.
#
# The Kyverno chart ships with several hook-based Jobs (webhooksCleanup,
# policyReportsCleanup, etc.) that use the admission-controller
# ServiceAccount BEFORE the chart creates it, and historically pulled
# bitnami/kubectl images that no longer exist on Docker Hub. This is the
# same fix applied to the hub in estabilis-platform@c7216a0.
#
# Without this, a clean install fails with ImagePullBackOff on
# kyverno-clean-reports / kyverno-hook-pre-delete.
# ----------------------------------------------------------------------------
webhooksCleanup:
  enabled: false

policyReportsCleanup:
  enabled: false

# ----------------------------------------------------------------------------
# Grafana integration — disabled; metrics are exposed by metricsService
# and scraped independently. No bundled Grafana dashboards.
# ----------------------------------------------------------------------------
grafana:
  enabled: false
