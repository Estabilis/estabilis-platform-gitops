# Workload overlay — Kyverno upstream chart values for workload clusters
commonLabels:
  estabilis.io/managed-by: workload-bootstrap
  estabilis.io/component: kyverno

# Webhook hardening for batch policy deployment.
# Fresh workload clusters deploy 30 ClusterPolicies at once. The
# policy-validation webhook processes requests sequentially per pod.
# With 1 replica and ~2s per policy, 30 policies = 60s > 30s max timeout.
#
# forceFailurePolicyIgnore: resource-validation webhooks use Ignore
# instead of Fail (policy-validation stays Fail by design).
features:
  forceFailurePolicyIgnore:
    enabled: true

# Scale admission controller to 3 replicas — distributes webhook
# validation across pods, reducing per-pod queue depth from 30 to ~10.
# 3 replicas per Kyverno scaling docs — distributes webhook validation
# across pods. See: https://kyverno.io/docs/installation/scaling/
admissionController:
  replicas: 3
  container:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        # CPU limit set high to avoid throttling (Kyverno best practice).
        # Must be explicit — the kyverno namespace LimitRange injects
        # default cpu limit of 100m which conflicts with higher requests.
        cpu: 500m
        memory: 512Mi
