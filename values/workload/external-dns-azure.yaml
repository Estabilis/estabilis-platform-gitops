# Azure DNS provider config for workload external-dns.
# Loaded when estabilis.io/bridge.dns-provider=azure.

provider:
  name: azure

serviceAccount:
  create: true
  annotations:
    azure.workload.identity/use: "true"
    azure.workload.identity/client-id: ""

podLabels:
  azure.workload.identity/use: "true"

extraVolumes:
  - name: azure-config
    secret:
      secretName: external-dns-azure-config

extraVolumeMounts:
  - name: azure-config
    mountPath: /etc/kubernetes
    readOnly: true
