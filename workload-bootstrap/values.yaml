# ============================================================================
# workload-bootstrap — defaults
# ============================================================================
# Overridden per client via overrides/workload-bootstrap/values.yaml in the
# client's downstream repo (same pattern as overrides/platform-root/values.yaml).
# ============================================================================

# Version of this repo (estabilis-platform-gitops) that the nested
# Application should pin to when reading $values. Kept in sync with
# the Application's targetRevision in estabilis-platform so $values
# always matches the rendered templates.
repoURL: https://github.com/Estabilis/estabilis-platform-gitops.git
repoVersion: v0.1.7

# Version of estabilis-platform (the HUB-side repo) that rendered this chart.
# Passed as a helm parameter by the parent Application
# (estabilis-platform/bootstrap/platform-root/templates/workload-bootstrap.yaml).
# Used for the estabilis.io/platform-version annotation on workload namespaces
# — distinct from workload-bootstrap-version (this chart's own Chart.yaml),
# which tracks the GitOps layer. "unknown" is the standalone/render fallback.
platformVersion: unknown

# Label selector used by the ApplicationSet cluster generator to detect
# workload clusters. This is the label the estabilis-workload-operator
# writes on the ArgoCD Cluster Secret (verified on 2026-04-07 with operator
# v0.3.6). Changing this requires updating the operator.
clusterSelector:
  matchLabels:
    estabilis.io/managed-by: workload-operator

# Per-component configuration. Each component becomes one Application
# rendered by the ApplicationSet for every workload cluster that matches
# the selector above.
components:

  kyverno:
    enabled: true
    # Upstream chart coordinates — same repo and version as the hub
    # (estabilis-platform/core/components/kyverno) so both sides stay
    # in lockstep. Bump together.
    chart:
      repoURL: https://kyverno.github.io/kyverno
      chart: kyverno
      targetRevision: 3.7.1
    # Destination on the workload cluster
    namespace: kyverno
    # Values file read from THIS repo as $values (multi-source Application)
    valuesPath: workload-components/kyverno/values.yaml
    # ArgoCD sync options for this component.
    # Mirrors the hub Kyverno Application exactly:
    #   - automated.selfHeal only (NO prune — prune fights with helm hook
    #     Jobs that complete and get deleted, causing flapping)
    #   - RespectIgnoreDifferences pairs with the CRD metadata
    #     ignoreDifferences block in the ApplicationSet template
    #   - retry policy identical to the hub
    syncPolicy:
      automated:
        selfHeal: true
      retry:
        limit: 10
        backoff:
          duration: 10s
          factor: 2
          maxDuration: 3m
      syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - RespectIgnoreDifferences=true
