# ============================================================================
# workload-bootstrap — defaults
# ============================================================================
# Rendered by the hub's ArgoCD for every workload cluster registered by the
# estabilis-workload-operator. Follows the SAME toggle convention as
# estabilis-platform/bootstrap/platform-root/values.yaml so operators and
# clients see one pattern, not two.
#
# Downstream can override via overrides/workload-bootstrap/values.yaml in the
# client's private platform repo (identical mechanism to overrides/platform-root/).
# ============================================================================

# Version of this repo (estabilis-platform-gitops) that nested Applications
# should pin to when reading $values. Kept in sync with the hub Application's
# targetRevision so $values always matches the rendered templates.
repoURL: https://github.com/Estabilis/estabilis-platform-gitops.git
repoVersion: v0.37.0

# Version of estabilis-platform (the HUB-side repo) that rendered this chart.
# Passed as a helm parameter by the parent Application
# (estabilis-platform/bootstrap/platform-root/templates/workload-bootstrap.yaml).
# Used for the estabilis.io/platform-version annotation on workload namespaces
# — distinct from workload-bootstrap-version (this chart's own Chart.yaml),
# which tracks the GitOps layer. "unknown" is the standalone/render fallback.
platformVersion: unknown

# ---------------------------------------------------------------------------
# Supply-chain provenance — ADR 0005 Phase 2
# ---------------------------------------------------------------------------
# The four L1 annotations emitted onto namespaces bootstrapped by this
# chart on workload clusters. Injected as helm.parameters by the hub's
# platform-root Application (which receives them from the CLI at render
# time). When any value is empty, the namespace helper skips the block
# entirely (guarded by gitRevision).
#
# Reference: estabilis-platform-tools/docs/adr/0005-supply-chain-provenance.md
# ---------------------------------------------------------------------------
global:
  environment: ""
  # Azure identity values (tenantId, keyVaultUri, externalSecretsClientId)
  # are NO LONGER passed as helm parameters. They are read directly from
  # ArgoCD Cluster Secret annotations via the ApplicationSet cluster
  # generator's {{metadata.annotations.xxx}} syntax. The workload Terraform
  # writes these annotations to the Cluster Secret on the hub. See:
  # estabilis-workload/providers/azure/cluster-annotations.tf
  provenance:
    gitRevision: ""
    gitSource: ""
    builtAt: ""
    buildId: ""

# Label selector used by the ApplicationSet clusters generator to detect
# workload clusters. This is the label the estabilis-workload-operator
# writes on the ArgoCD Cluster Secret (verified on 2026-04-07 with operator
# v0.3.6). Changing this requires updating the operator.
clusterSelector:
  matchLabels:
    estabilis.io/managed-by: workload-operator

# ---------------------------------------------------------------------------
# Component Toggles
# ---------------------------------------------------------------------------
# Controls which workload-side components are bootstrapped. Flat boolean
# map mirroring bootstrap/platform-root/values.yaml.components convention.
#
# Each enabled component has a matching template in templates/<name>.yaml
# that defines its ApplicationSet (chart coordinates, sync policy,
# managedNamespaceMetadata flavor, ignoreDifferences, etc.).
#
# Classification (v1 workload bootstrap — minimal):
#   core — CANNOT be disabled without breaking the workload baseline
components:
  # --- core ---
  kyverno: true              # core: admission/background/cleanup/reports controllers
  kyverno-policies: true     # core: ClusterPolicies (29 baseline rules, all Audit mode)
  kyverno-exceptions: true   # core: PolicyException CRDs + namespace labels
  network-policies: true     # core: namespace isolation (deny-all + allow rules)
  resource-quotas: true      # core: prevent namespace resource starvation
  cert-manager: true         # core: TLS certificate management
  cert-manager-config: true  # core: ClusterIssuers (Let's Encrypt via DNS-01)
  external-secrets: true     # core: secrets management via provider vault
  cluster-secret-store: true # core: ClusterSecretStore for external-secrets
  external-dns: true         # core: automatic DNS record management (Azure DNS or Cloudflare)
  external-dns-config: true  # core: provider-specific Secret for external-dns (Azure json or Cloudflare token via ESO)

  # --- observability ---
  alloy: true                # observability: unified collector (logs + metrics → hub Loki/Mimir)
  kube-state-metrics: true   # observability: Kubernetes object metrics (Deployment, Pod, Node state)
  node-exporter: true        # observability: node-level OS metrics (CPU, memory, disk, network)

  # --- network observability (ACNS only) ---
  hubble-ui: true            # ACNS: Cilium Hubble UI for network flow visualization

  # --- ingress (ADR 0014) ---
  traefik: true              # ingress controller for exposure charts
  hubble-ui-ingress: true    # Hubble UI external ingress (requires traefik)

# ---------------------------------------------------------------------------
# Downstream override repo (per-client configuration)
# ---------------------------------------------------------------------------
# When both values are set, each workload ApplicationSet gains a third
# source ($overrides) that reads component-specific overrides from the
# client's downstream config repo. Path convention:
#   $overrides/overrides/{component}/values.yaml
#
# Without these values, the override source is disabled (no-op) and
# all workload clusters use the base chart values only.
#
# Set by the platform-root Application template when rendering
# workload-bootstrap — the hub passes the client's downstream repo
# URL and version as helm parameters.
configRepoUrl: ""

# Git ref for the config repo. Prefer `configRepoRevision` (added
# v0.31.0 per ADR 0020) which accepts branches (main / release/<env>)
# for continuous reconciliation OR tags for pinned releases.
# `configRepoVersion` is retained for backcompat — when both are
# set, `configRepoRevision` wins. When both are empty but
# `configRepoUrl` is set, the helpers fail loudly.
configRepoRevision: ""
configRepoVersion: ""  # DEPRECATED: use configRepoRevision

# ---------------------------------------------------------------------------
# Client GitOps repo (ADR 0008 Tier 3 — per-client override source)
# ---------------------------------------------------------------------------
# Passed from the hub as helm parameters. The workload-bootstrap
# ApplicationSets forward these to each child Application so kyverno
# (and future components) can read per-platform overrides from the
# client's gitops repo.
clientGitopsRepoUrl: ""

# Git ref for the client gitops repo. Prefer `clientGitopsRepoRevision`
# (added v0.31.0 per ADR 0020) which accepts branches (main /
# release/<env>) for continuous reconciliation OR tags for pinned
# releases. `clientGitopsRepoVersion` is retained for backcompat —
# when both are set, `clientGitopsRepoRevision` wins.
clientGitopsRepoRevision: ""
clientGitopsRepoVersion: ""  # DEPRECATED: use clientGitopsRepoRevision

deploymentId: ""

# Scheduling policy per component (ADR 0012 — tracked in
# Estabilis/estabilis-platform-tools#97). Empty by default — each
# template falls back to its opinionated mode (usually "auto", some
# "regular-only" for stateful components).
# Override per-component:
#   scheduling:
#     kyverno: regular-only
#     cert-manager: spot-only
scheduling: {}
