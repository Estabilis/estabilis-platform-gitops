# Workload Alloy — base chart values (upstream defaults).
# The Alloy pipeline config (loki.write, prometheus.remote_write, scrape jobs)
# is deployment-specific and lives in the client gitops repo override:
#   platforms/{deployment-id}/workload-overrides/alloy/values.yaml
#
# This file provides chart structure only (DaemonSet, resources, tolerations).
# All values here must pass Kyverno policies (require-image-digest,
# require-limits, require-run-as-nonroot, drop-all-capabilities,
# require-seccomp-profile, no-privilege-escalation) and PodSecurity baseline.

commonLabels:
  estabilis.io/component: alloy

# --- Images pinned by digest (require-image-digest policy) ---
image:
  digest: "sha256:91b90e5d90f092affb2db04f973a59d15740e47a3b33932756fca6f53ffbdd39"

configReloader:
  image:
    digest: "sha256:6bfe763f260e3dda51615147b1fb9e2cac3ca2c53ad9825c7b5a11935b328a8a"
  resources:
    requests:
      cpu: 10m
      memory: 50Mi
    limits:
      cpu: 100m
      memory: 128Mi

# --- Main Alloy container ---
alloy:
  clustering:
    enabled: true
  # Workload Alloy does NOT need privileged or root (no eBPF profiling —
  # that's hub-only). loki.source.kubernetes reads logs via the K8s API
  # (kubelet /containerLogs), not from /var/log. Runs as non-root,
  # compatible with PodSecurity "baseline" and all Kyverno policies.
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]
    seccompProfile:
      type: RuntimeDefault
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

controller:
  type: "daemonset"

tolerations:
  - key: "kubernetes.azure.com/scalesetpriority"
    operator: "Equal"
    value: "spot"
    effect: "NoSchedule"
