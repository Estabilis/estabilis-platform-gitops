apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-adding-capabilities
  annotations:
    policies.kyverno.io/title: Disallow Adding Capabilities
    policies.kyverno.io/description: >-
      Prevents containers from adding Linux capabilities beyond the default set.
      Adding capabilities such as NET_ADMIN or SYS_ADMIN can be used to escalate
      privileges and break container isolation.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: adding-capabilities-pods
      match:
        any:
          - resources:
              kinds:
                - Pod

      exclude:
        any:
          - resources:
              namespaces:
                - argocd
                - cert-manager
                - cnpg-system
                - external-dns
                - external-secrets
                - grafana
                - kube-node-lease
                - kube-public
                - kube-state-metrics
                - kube-system
                - kyverno
                - node-exporter
                - opencost
                - traefik
                - trivy-system
                - velero
      validate:
        message: "Containers must not add Linux capabilities."
        foreach:
          - list: "request.object.spec.[containers, initContainers, ephemeralContainers][]"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.capabilities.add || '' | length(@) }}"
                    operator: GreaterThan
                    value: 0
    - name: adding-capabilities-controllers
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job

      exclude:
        any:
          - resources:
              namespaces:
                - argocd
                - cert-manager
                - cnpg-system
                - external-dns
                - external-secrets
                - grafana
                - kube-node-lease
                - kube-public
                - kube-state-metrics
                - kube-system
                - kyverno
                - node-exporter
                - opencost
                - traefik
                - trivy-system
                - velero
      validate:
        message: "Containers must not add Linux capabilities."
        foreach:
          - list: "request.object.spec.template.spec.[containers, initContainers, ephemeralContainers][]"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.capabilities.add || '' | length(@) }}"
                    operator: GreaterThan
                    value: 0
    - name: adding-capabilities-cronjob
      match:
        any:
          - resources:
              kinds:
                - CronJob

      exclude:
        any:
          - resources:
              namespaces:
                - argocd
