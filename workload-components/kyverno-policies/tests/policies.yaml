  validationFailureAction: Audit
  background: true
  rules:
    - name: deny-ingress-platform-namespaces
      match:
        any:
          - resources:
              kinds:
                - Ingress
              namespaces:
                - cert-manager
                - external-secrets
                - external-dns
                - kyverno
                - grafana
                - opencost
                - velero
                - trivy-system
                - cnpg-system
                - kube-state-metrics
                - node-exporter
                - policy-reporter
      validate:
        message: "Ingress resources are not allowed in platform namespaces. Platform ingress is managed by the upstream configuration."
        deny: {}
