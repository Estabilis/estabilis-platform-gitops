{{- /*
  ClusterSecretStore for every workload cluster.

  Opt-in toggle: components.cluster-secret-store (flat boolean, mirrors
  platform-root convention).

  SINGLE SOURCE OF TRUTH. The chart in components/cluster-secret-store is
  shared by both hub and workload clusters. The
  values/workload/cluster-secret-store.yaml overlay provides any workload-
  specific overrides.

  Sync-wave 5 — after external-secrets (wave 3) so CRDs are available
  and the operator is running.

  Multi-source Application:
    1) This repo directly (path: components/cluster-secret-store).
    2) This repo as $values — provides the base values and the
       workload overlay from values/workload/cluster-secret-store.yaml.

  No managedNamespaceMetadata: the external-secrets namespace is already
  created by the workload-external-secrets ApplicationSet.
*/ -}}
{{- if index .Values.components "cluster-secret-store" }}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workload-cluster-secret-store
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            {{- toYaml .Values.clusterSelector.matchLabels | nindent 12 }}
  template:
    metadata:
      name: "workload-cluster-secret-store-{{ `{{name}}` }}"
      annotations:
        argocd.argoproj.io/sync-wave: "5"
      labels:
        estabilis.io/workload-cluster: "{{ `{{name}}` }}"
    spec:
      project: workload-baseline
      sources:
        # 1) The chart itself, from this repo
        - repoURL: {{ .Values.repoURL | quote }}
          targetRevision: {{ .Values.repoVersion | quote }}
          path: components/cluster-secret-store
          helm:
            releaseName: "cluster-secret-store"
            valueFiles:
              - $values/components/cluster-secret-store/values.yaml
              - $values/values/workload/cluster-secret-store.yaml
              {{- include "workload-bootstrap.overrideValueFile" (dict "component" "cluster-secret-store" "root" $) | nindent 14 }}
              {{- include "workload-bootstrap.gitopsValueFile" (dict "component" "cluster-secret-store" "root" $) | nindent 14 }}
            ignoreMissingValueFiles: true
            parameters:
              - name: global.environment
                value: {{ .Values.global.environment | quote }}
              - name: vaultUrl
                value: '{{ `{{metadata.annotations.estabilis-keyvault-uri}}` }}'
              - name: tenantId
                value: '{{ `{{metadata.annotations.estabilis-tenant-id}}` }}'
              {{- include "workload-bootstrap.provenanceParameters" $ | nindent 14 }}
        # 2) This repo as $values — overlay source
        - repoURL: {{ .Values.repoURL | quote }}
          targetRevision: {{ .Values.repoVersion | quote }}
          ref: values
        # 3) Client override repo (conditional — only when configRepoUrl is set)
        {{- include "workload-bootstrap.overrideSource" . | nindent 8 }}
        {{- include "workload-bootstrap.gitopsSource" . | nindent 8 }}
      destination:
        server: "{{ `{{server}}` }}"
        namespace: "external-secrets"
      syncPolicy:
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
{{- end }}
