{{- if .Values.policies.validate_namespace_name.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: validate-namespace-name
  labels:
    {{- include "estabilis.labels" . | nindent 4 }}
  annotations:
    {{- include "estabilis.annotations" . | nindent 4 }}
    policies.kyverno.io/title: Validate Namespace Name
    policies.kyverno.io/description: >-
      Validates that namespace names follow the convention of lowercase
      alphanumeric characters and hyphens only. This prevents naming
      inconsistencies and avoids issues with DNS-based service discovery.
spec:
  validationFailureAction: {{ .Values.policies.validate_namespace_name.action | default "Audit" }}
  background: true
  rules:
    - name: check-namespace-name
      match:
        any:
          - resources:
              kinds:
                - Namespace
{{ include "kyverno-policies.platform-exclude-namespaces" . }}
      validate:
        message: "Namespace name must be lowercase alphanumeric with hyphens only (regex: ^[a-z0-9]([a-z0-9-]*[a-z0-9])?$)."
        deny:
          conditions:
            any:
              - key: "{{`{{ regex_match('^[a-z0-9]([a-z0-9-]*[a-z0-9])?$', request.object.metadata.name) }}`}}"
                operator: NotEquals
                value: true
{{- end }}
