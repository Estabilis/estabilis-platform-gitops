{{- if .Values.policies.inject_pss_labels.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-pss-labels
  labels:
    {{- include "estabilis.labels" . | nindent 4 }}
  annotations:
    {{- include "estabilis.annotations" . | nindent 4 }}
    policies.kyverno.io/title: Inject PSS Labels
    policies.kyverno.io/description: >-
      Injects Pod Security Standards (PSS) labels on namespaces.
      Client namespaces (app-*) get enforce=restricted.
      Namespaces listed in .Values.policies.inject_pss_labels.privilegedNamespaces
      and .extraPrivilegedNamespaces get enforce=privileged.
      All other platform namespaces get enforce=baseline with warn/audit=restricted.
spec:
  # Declare Kyverno CRD defaults explicitly. When omitted, Kyverno
  # populates these on admission with defaults — ArgoCD then sees
  # field-level diff between git (missing) and live (populated) →
  # infinite OutOfSync. Declaring matches the admitted form and
  # eliminates the drift. Functional behavior unchanged (these ARE
  # the CRD defaults).
  admission: true
  emitWarning: false
  validationFailureAction: Audit
  background: true
  rules:
    - name: inject-pss-restricted-client
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
                - "app-*"
      mutate:
        patchStrategicMerge:
          metadata:
            labels:
              pod-security.kubernetes.io/enforce: restricted
              pod-security.kubernetes.io/enforce-version: latest
              pod-security.kubernetes.io/audit: restricted
              pod-security.kubernetes.io/audit-version: latest
              pod-security.kubernetes.io/warn: restricted
              pod-security.kubernetes.io/warn-version: latest
    - name: inject-pss-privileged
      match:
        any:
          - resources:
              kinds:
                - Namespace
              names:
{{- range (concat (default (list) .Values.policies.inject_pss_labels.privilegedNamespaces) (default (list) .Values.policies.inject_pss_labels.extraPrivilegedNamespaces)) }}
                - {{ . }}
{{- end }}
      mutate:
        patchStrategicMerge:
          metadata:
            labels:
              pod-security.kubernetes.io/enforce: privileged
              pod-security.kubernetes.io/enforce-version: latest
              pod-security.kubernetes.io/audit: baseline
              pod-security.kubernetes.io/audit-version: latest
              pod-security.kubernetes.io/warn: baseline
              pod-security.kubernetes.io/warn-version: latest
    - name: inject-pss-baseline-platform
      match:
        any:
          - resources:
              kinds:
                - Namespace
      exclude:
        any:
          - resources:
              names:
                - "app-*"
{{- range (concat (default (list) .Values.policies.inject_pss_labels.privilegedNamespaces) (default (list) .Values.policies.inject_pss_labels.extraPrivilegedNamespaces)) }}
                - {{ . }}
{{- end }}
          - resources:
              names:
{{ include "kyverno-policies.excluded-namespace-list" . }}
      mutate:
        patchStrategicMerge:
          metadata:
            labels:
              pod-security.kubernetes.io/enforce: baseline
              pod-security.kubernetes.io/enforce-version: latest
              pod-security.kubernetes.io/audit: restricted
              pod-security.kubernetes.io/audit-version: latest
              pod-security.kubernetes.io/warn: restricted
              pod-security.kubernetes.io/warn-version: latest
{{- end }}
