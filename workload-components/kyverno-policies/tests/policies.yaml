                - kube-public
                - kube-state-metrics
                - kube-system
                - kyverno
                - node-exporter
                - opencost
                - traefik
                - trivy-system
                - velero
      validate:
        message: "Container images must use a digest reference (@sha256:)."
        foreach:
          - list: "request.object.spec.[containers, initContainers, ephemeralContainers][]"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: NotEquals
                    value: "*@sha256:*"
