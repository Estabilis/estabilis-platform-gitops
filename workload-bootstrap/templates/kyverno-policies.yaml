{{- /*
  Kyverno ClusterPolicies for every workload cluster.

  Opt-in toggle: components.kyverno-policies (flat boolean, mirrors
  platform-root convention).

  SINGLE SOURCE OF TRUTH. The chart in components/kyverno-policies is
  shared by both hub and workload clusters (ADR 0002 Phase 3). The
  values/workload/kyverno-policies.yaml overlay provides any workload-
  specific overrides.

  The rendered ApplicationSet uses a clusters generator keyed off
  .Values.clusterSelector.matchLabels — the same label the operator
  writes on ArgoCD Cluster Secrets when it registers a workload.

  Multi-source Application:
    1) This repo directly (path: components/kyverno-policies).
    2) This repo as $values — provides the base values and the
       workload overlay from values/workload/kyverno-policies.yaml.

  No managedNamespaceMetadata: the kyverno namespace is already created
  by the workload-kyverno ApplicationSet. Mirrors hub kyverno-policies
  Application exactly (no automated sync — destructive changes to
  ClusterPolicies must be operator-initiated).
*/ -}}
{{- if index .Values.components "kyverno-policies" }}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workload-kyverno-policies
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            {{- toYaml .Values.clusterSelector.matchLabels | nindent 12 }}
  template:
    metadata:
      name: "workload-kyverno-policies-{{ `{{name}}` }}"
      annotations:
        argocd.argoproj.io/sync-wave: "3"
      labels:
        estabilis.io/workload-cluster: "{{ `{{name}}` }}"
    spec:
      project: default
      sources:
        # 1) The chart itself, from this repo
        - repoURL: {{ .Values.repoURL | quote }}
          targetRevision: {{ .Values.repoVersion | quote }}
          path: components/kyverno-policies
          helm:
            releaseName: "kyverno-policies"
            valueFiles:
              - $values/components/kyverno-policies/values.yaml
              - $values/values/workload/kyverno-policies.yaml
              {{- include "workload-bootstrap.overrideValueFile" (dict "component" "kyverno-policies" "root" $) | nindent 14 }}
            {{- include "workload-bootstrap.ignoreMissingValueFiles" $ | nindent 12 }}
            parameters:
              - name: global.environment
                value: {{ .Values.global.environment | quote }}
              {{- include "workload-bootstrap.provenanceParameters" $ | nindent 14 }}
        # 2) This repo as $values — overlay source
        - repoURL: {{ .Values.repoURL | quote }}
          targetRevision: {{ .Values.repoVersion | quote }}
          ref: values
        # 3) Client override repo (conditional — only when configRepoUrl is set)
        {{- include "workload-bootstrap.overrideSource" . | nindent 8 }}
      destination:
        server: "{{ `{{server}}` }}"
        namespace: "kyverno"
      syncPolicy:
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
{{- end }}
