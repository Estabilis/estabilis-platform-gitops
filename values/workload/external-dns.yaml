# Workload-specific base values for external-dns.
# Provider-specific overrides come from external-dns-{azure|cloudflare}.yaml
# selected by the bridge annotation estabilis.io/bridge.dns-provider.

commonLabels:
  estabilis.io/component: external-dns

txtOwnerId: ""

policy: upsert-only

sources:
  - service
  - ingress

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  capabilities:
    drop: [ALL]
  seccompProfile:
    type: RuntimeDefault

resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

domainFilters: []
