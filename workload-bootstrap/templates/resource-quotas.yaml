{{- /*
  Resource quotas and limit ranges for every workload cluster.

  Opt-in toggle: components.resource-quotas (flat boolean, mirrors
  platform-root convention).

  SINGLE SOURCE OF TRUTH. The chart in components/resource-quotas is
  shared by both hub and workload clusters (ADR 0002 Phase 2). The
  values/workload/resource-quotas.yaml overlay provides any workload-
  specific overrides (e.g. different quota limits per namespace).

  The rendered ApplicationSet uses a clusters generator keyed off
  .Values.clusterSelector.matchLabels — the same label the operator
  writes on ArgoCD Cluster Secrets when it registers a workload.

  Multi-source Application:
    1) This repo directly (path: components/resource-quotas).
    2) This repo as $values — provides the base values and the
       workload overlay from values/workload/resource-quotas.yaml.

  Destination namespace is "default" — ResourceQuotas are namespace-
  scoped but the chart creates them across multiple namespaces via
  metadata.namespace in each resource.
*/ -}}
{{- if ne (index .Values.components "resource-quotas") false }}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: resource-quotas
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            {{- toYaml .Values.clusterSelector.matchLabels | nindent 12 }}
  template:
    metadata:
      name: "resource-quotas-{{ `{{name}}` }}"
      annotations:
        argocd.argoproj.io/sync-wave: "10"
      labels:
        estabilis.io/workload-cluster: "{{ `{{name}}` }}"
    spec:
      project: workload-baseline
      sources:
        # 1) The chart itself, from this repo
        - repoURL: {{ .Values.repoURL | quote }}
          targetRevision: {{ .Values.repoVersion | quote }}
          path: components/resource-quotas
          helm:
            releaseName: "resource-quotas"
            valueFiles:
              - $values/components/resource-quotas/values.yaml
              - $values/values/workload/resource-quotas.yaml
              {{- include "workload-bootstrap.overrideValueFile" (dict "component" "resource-quotas" "root" $) | nindent 14 }}
              {{- include "workload-bootstrap.gitopsValueFile" (dict "component" "resource-quotas" "root" $) | nindent 14 }}
            ignoreMissingValueFiles: true
            parameters:
              - name: global.environment
                value: {{ .Values.global.environment | quote }}
              {{- range $name, $enabled := .Values.components }}
              - name: components.{{ $name }}
                value: {{ $enabled | quote }}
              {{- end }}
              # Explicitly disable components NOT in the workload baseline
              {{- $chartNamespaces := list "grafana" "argocd" "cert-manager" "external-secrets" "external-dns" "cnpg-system" "traefik" "velero" "opencost" "trivy-system" "kube-state-metrics" "node-exporter" }}
              {{- range $ns := $chartNamespaces }}
              {{- if not (hasKey $.Values.components $ns) }}
              - name: components.{{ $ns }}
                value: "false"
              {{- end }}
              {{- end }}
              {{- include "workload-bootstrap.provenanceParameters" $ | nindent 14 }}
        # 2) This repo as $values — overlay source
        - repoURL: {{ .Values.repoURL | quote }}
          targetRevision: {{ .Values.repoVersion | quote }}
          ref: values
        # 3) Client override repo (conditional — only when configRepoUrl is set)
        {{- include "workload-bootstrap.overrideSource" . | nindent 8 }}
        {{- include "workload-bootstrap.gitopsSource" . | nindent 8 }}
      destination:
        server: "{{ `{{server}}` }}"
        namespace: "default"
      syncPolicy:
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
{{- end }}
