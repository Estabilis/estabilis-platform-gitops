# =============================================================================
# grafana namespace
# Components: grafana, loki, mimir, tempo, alloy
# =============================================================================
{{- if and .Values.policies.grafana.enabled (ne (.Values.components.grafana | toString) "false") }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana
  namespace: grafana
  {{- include "estabilis.metadata" . | nindent 2 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from traefik (ingress controller)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
    # Allow internal comms (loki/mimir/tempo/alloy/grafana)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: grafana
    # Allow from all namespaces (alloy receives metrics from all pods)
    - from:
        - namespaceSelector: {}
  egress:
{{ include "network-policies.dns-egress" . }}
    # PostgreSQL to cnpg-system
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - protocol: TCP
          port: 5432
    # Azure storage private endpoints (HTTPS)
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # Alloy needs egress to ALL namespaces for log collection
    - to:
        - namespaceSelector: {}
{{- end }}
---
# =============================================================================
# argocd namespace
# Needs broad egress: github, chart registries, kubernetes API
# =============================================================================
{{- if and .Values.policies.argocd.enabled (ne (.Values.components.argocd | toString) "false") }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-argocd
  namespace: argocd
  {{- include "estabilis.metadata" . | nindent 2 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
{{ include "network-policies.dns-egress" . }}
    # All egress (github, chart registries, kubernetes API)
    - to: []
{{- end }}
---
