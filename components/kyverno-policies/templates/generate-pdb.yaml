{{- if .Values.policies.generate_pdb.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-pdb
  labels:
    {{- include "estabilis.labels" . | nindent 4 }}
  annotations:
    {{- include "estabilis.annotations" . | nindent 4 }}
    policies.kyverno.io/title: Generate PodDisruptionBudget
    policies.kyverno.io/description: >-
      Passively generates a PodDisruptionBudget for Deployments with
      2+ replicas on admission, but ONLY when the namespace has no
      existing PDB (respects chart-managed PDBs). The generated PDB
      uses `maxUnavailable: 1` plus `unhealthyPodEvictionPolicy:
      AlwaysAllow` so drains are never blocked by NotReady/Terminating
      pods. Non-invasive: `synchronize: false` means if the generated
      PDB is deleted, Kyverno does NOT recreate it; `generateExisting:
      false` means pre-existing Deployments at policy-install time are
      left alone. The apiCall precondition queries the namespace for
      PDBs before generating — charts that ship their own PDB (Kong,
      Dapr, etc.) are skipped automatically.
      See Estabilis/estabilis-platform-gitops#2.
spec:
  background: true
  rules:
    - name: generate-pdb-for-deployments
      match:
        any:
          - resources:
              kinds:
                - Deployment
{{ include "kyverno-policies.platform-exclude" . }}
      context:
        - name: pdbCount
          apiCall:
            method: GET
            urlPath: "/apis/policy/v1/namespaces/{{`{{request.object.metadata.namespace}}`}}/poddisruptionbudgets"
            jmesPath: "items | length(@)"
      preconditions:
        all:
          - key: "{{`{{ request.object.spec.replicas || '1' }}`}}"
            operator: GreaterThan
            value: "1"
          - key: "{{`{{ pdbCount }}`}}"
            operator: Equals
            value: 0
      generate:
        # Passive mode: generate once at Deployment admission; do not sync
        # (if deleted, stay deleted — respects chart-owned PDBs) and do not
        # retroactively generate for existing Deployments (upgrade safety).
        generateExisting: false
        synchronize: false
        apiVersion: policy/v1
        kind: PodDisruptionBudget
        name: "{{`{{ request.object.metadata.name }}`}}-pdb"
        namespace: "{{`{{ request.object.metadata.namespace }}`}}"
        data:
          spec:
            # Drain-friendly defaults:
            # - maxUnavailable allows evicting at least 1 replica at a time
            #   (replicas=1 → 0 eviction, but with replicas=2+ always tolerates 1)
            # - unhealthyPodEvictionPolicy=AlwaysAllow lets NotReady /
            #   Terminating pods be evicted unconditionally (critical for
            #   teardown and for recovering from stuck deployments)
            maxUnavailable: 1
            unhealthyPodEvictionPolicy: AlwaysAllow
            selector:
              matchLabels: "{{`{{ request.object.spec.selector.matchLabels }}`}}"
{{- end }}
