# Resource quotas and limit ranges per namespace
# Override via downstream overrides/resource-quotas/values.yaml
#
# Downstream can add custom namespaces. If 'hard' or 'limitRange' is omitted, defaults are used.
# Example:
#   namespaces:
#     my-app:
#       enabled: true
#       # uses defaults below for both quota and limitRange
#
# Component-aware gating (ADR 0009):
# On workload clusters, the workload-bootstrap ApplicationSet passes
# the active components map as helm parameters. Each namespace quota
# is gated by BOTH namespaces.{ns}.enabled AND components.{ns}.

# Active components — defaults to true (platform hub has everything).
# Overridden by workload-bootstrap parameters on workload clusters.
components:
  grafana: true
  argocd: true
  kyverno: true
  cert-manager: true
  trivy-system: true
  external-secrets: true
  cnpg-system: true
  traefik: true
  opencost: true
  velero: true
  external-dns: true
  node-exporter: true
  kube-state-metrics: true
  # AWS-only — DEFAULT FALSE on purpose.
  # Same rationale as the network-policies chart: the upstream platform-root
  # Application templates gate the Apps on `global.provider == "aws"`, so
  # these namespaces don't exist on Azure. Defaults are `false` so this
  # chart doesn't try to apply ResourceQuota / LimitRange to non-existent
  # namespaces. Upstream platform-root (>= v0.27.0) only flips them to
  # `true` on AWS deployments where the relevant feature flag is set
  # (metrics-server is unconditional on AWS — Azure AKS ships it natively).
  aws-load-balancer-controller: false
  karpenter: false
  metrics-server: false

  # Multi-provider opt-in — DEFAULT FALSE. Activated when
  # vault_enabled = true in terraform.tfvars.
  vault: false

defaults:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    pods: "20"
    persistentvolumeclaims: "5"
  limitRange:
    default:
      cpu: 100m
      memory: 128Mi
    defaultRequest:
      cpu: 10m
      memory: 32Mi
    max:
      cpu: "4"
      memory: 8Gi

namespaces:
  grafana:
    enabled: true
    hard:
      requests.cpu: "4"
      requests.memory: 8Gi
      limits.cpu: "16"
      limits.memory: 32Gi
      pods: "60"
      persistentvolumeclaims: "20"
  argocd:
    enabled: true
    hard:
      requests.cpu: "4"
      requests.memory: 8Gi
      limits.cpu: "16"
      limits.memory: 16Gi
      pods: "30"
      persistentvolumeclaims: "5"
    # ArgoCD's application-controller alone needs ~1Gi to manage ~40 Apps;
    # the platform default (128Mi) OOMKills it. Override LimitRange for
    # this namespace so the controller gets enough memory out of the box.
    limitRange:
      default:
        cpu: "1"
        memory: 2Gi
      defaultRequest:
        cpu: 100m
        memory: 256Mi
      max:
        cpu: "4"
        memory: 8Gi
  kyverno:
    enabled: true
    hard:
      requests.cpu: "1"
      requests.memory: 2Gi
      limits.cpu: "4"
      limits.memory: 8Gi
      pods: "20"
      persistentvolumeclaims: "5"
  cert-manager:
    enabled: true
    hard:
      requests.cpu: "1"
      requests.memory: 2Gi
      limits.cpu: "4"
      limits.memory: 4Gi
      pods: "10"
      persistentvolumeclaims: "5"
  trivy-system:
    enabled: true
    hard:
      requests.cpu: "2"
      requests.memory: 4Gi
      limits.cpu: "8"
      limits.memory: 8Gi
      pods: "20"
      persistentvolumeclaims: "5"
  external-secrets:
    enabled: true
    hard:
      requests.cpu: "1"
      requests.memory: 2Gi
      limits.cpu: "4"
      limits.memory: 4Gi
      pods: "10"
      persistentvolumeclaims: "5"
  cnpg-system:
    enabled: true
    hard:
      requests.cpu: "2"
      requests.memory: 4Gi
      limits.cpu: "8"
      limits.memory: 8Gi
      pods: "10"
      persistentvolumeclaims: "10"
  traefik:
    enabled: true
    hard:
      requests.cpu: "1"
      requests.memory: 1Gi
      limits.cpu: "4"
      limits.memory: 4Gi
      pods: "10"
      persistentvolumeclaims: "5"
  opencost:
    enabled: true
    hard:
      requests.cpu: "1"
      requests.memory: 2Gi
      limits.cpu: "4"
      limits.memory: 4Gi
      pods: "10"
      persistentvolumeclaims: "5"
  velero:
    enabled: true
    hard:
      requests.cpu: "1"
      requests.memory: 1Gi
      limits.cpu: "2"
      limits.memory: 2Gi
      pods: "10"
      persistentvolumeclaims: "5"
  external-dns:
    enabled: true
    hard:
      requests.cpu: "500m"
      requests.memory: 1Gi
      limits.cpu: "2"
      limits.memory: 2Gi
      pods: "10"
      persistentvolumeclaims: "5"
  node-exporter:
    enabled: true
    hard:
      requests.cpu: "500m"
      requests.memory: 512Mi
      limits.cpu: "2"
      limits.memory: 1Gi
      pods: "10"
      persistentvolumeclaims: "5"
  kube-state-metrics:
    enabled: true
    hard:
      requests.cpu: "500m"
      requests.memory: 512Mi
      limits.cpu: "2"
      limits.memory: 1Gi
      pods: "10"
      persistentvolumeclaims: "5"
  # AWS-only — namespaces only exist on AWS clusters with the relevant
  # feature flag (ingress_controller=alb for ALB controller, autoscaler=
  # karpenter|hybrid for karpenter). Activated by `components.{ns}=true`
  # forwarded by the upstream platform-root.
  aws-load-balancer-controller:
    enabled: true
    hard:
      requests.cpu: "500m"
      requests.memory: 512Mi
      limits.cpu: "2"
      limits.memory: 1Gi
      pods: "10"
      persistentvolumeclaims: "5"
  karpenter:
    enabled: true
    # Sized for the karpenter chart defaults: 2 replicas × 500m CPU + 1Gi
    # memory each (requests). Quota gives 50% headroom over the steady
    # state to allow rolling updates (3 pods briefly during surge).
    hard:
      requests.cpu: "1500m"
      requests.memory: 3Gi
      limits.cpu: "4"
      limits.memory: 4Gi
      pods: "10"
      persistentvolumeclaims: "5"
  metrics-server:
    enabled: true
    # Sized for chart defaults: 2 replicas (HA) × 100m CPU + 200Mi memory
    # each (requests). Quota gives 50% headroom for rolling-update surges.
    hard:
      requests.cpu: "300m"
      requests.memory: 600Mi
      limits.cpu: "1"
      limits.memory: 1Gi
      pods: "10"
      persistentvolumeclaims: "5"
  vault:
    enabled: true
    # Sized for 3-replica Raft HA at chart defaults (50m/128Mi requests,
    # 250m/256Mi limits per pod). 50% headroom over steady state for
    # rolling-update surges (4 pods briefly).
    # PVC count = 3 (one per Raft replica, gp3/Premium_LRS).
    hard:
      requests.cpu: "300m"
      requests.memory: 600Mi
      limits.cpu: "1500m"
      limits.memory: 1500Mi
      pods: "10"
      persistentvolumeclaims: "5"
