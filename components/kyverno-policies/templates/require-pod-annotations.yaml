{{- if .Values.policies.require_pod_annotations.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-pod-annotations
  labels:
    {{- include "estabilis.labels" . | nindent 4 }}
  annotations:
    {{- include "estabilis.annotations" . | nindent 4 }}
    policies.kyverno.io/title: Require Pod Annotations
    policies.kyverno.io/description: >-
      Requires Deployments, StatefulSets, and DaemonSets to include
      estabilis.io/owner and estabilis.io/contact annotations for audit
      trail and ownership tracking. Only applies to client application namespaces.
spec:
  validationFailureAction: {{ .Values.policies.require_pod_annotations.action | default .Values.defaultAction | default "Audit" }}
  background: true
  rules:
    - name: require-owner-contact-annotations
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
              namespaces:
                - "app-*"
{{ include "kyverno-policies.platform-exclude" . }}
      validate:
        message: >-
          The annotations estabilis.io/owner and estabilis.io/contact are
          required for audit trail and ownership tracking.
        pattern:
          metadata:
            annotations:
              estabilis.io/owner: "?*"
              estabilis.io/contact: "?*"
{{- end }}
