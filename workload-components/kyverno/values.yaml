# ============================================================================
# Kyverno values overlay — injected into the upstream Kyverno chart via the
# multi-source Application rendered by workload-bootstrap.
#
# Source: https://kyverno.github.io/kyverno (version pinned in
# workload-bootstrap/values.yaml → components.kyverno.chart.targetRevision)
#
# LOCKSTEP WITH THE HUB.
# This file MUST mirror estabilis-platform/core/components/kyverno/values.yaml
# as closely as possible. Only deviate when there is a documented reason.
# When the hub bumps this chart, bump here too, in the same PR.
#
# Reference: https://kyverno.github.io/kyverno/
# ============================================================================

commonLabels:
  estabilis.io/managed-by: workload-bootstrap
  estabilis.io/component: kyverno

# ---------------------------------------------------------------------------
# Global namespace exclusion via webhook namespaceSelector
# Namespaces with label kyverno.io/exclude=true are completely ignored
# by Kyverno — no admission, no validation, no mutation.
# Same pattern as the hub so operators apply the same label everywhere.
# ---------------------------------------------------------------------------
config:
  webhooks:
    namespaceSelector:
      matchExpressions:
        - key: kyverno.io/exclude
          operator: DoesNotExist

admissionController:
  replicas: 1
  container:
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      capabilities:
        drop: [ALL]
      seccompProfile:
        type: RuntimeDefault
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 512Mi
  metricsService:
    create: true

backgroundController:
  enabled: true
  backgroundScanInterval: 5m
  container:
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      capabilities:
        drop: [ALL]
      seccompProfile:
        type: RuntimeDefault
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi
  metricsService:
    create: true
  rbac:
    clusterRole:
      extraResources:
        - apiGroups: ["policy"]
          resources: ["poddisruptionbudgets"]
          verbs: ["create", "update", "delete", "get", "list"]
        - apiGroups: ["networking.k8s.io"]
          resources: ["networkpolicies"]
          verbs: ["create", "update", "delete", "get", "list"]
        - apiGroups: [""]
          resources: ["resourcequotas", "limitranges"]
          verbs: ["create", "update", "delete", "get", "list"]

cleanupController:
  enabled: true
  container:
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      capabilities:
        drop: [ALL]
      seccompProfile:
        type: RuntimeDefault
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 128Mi
  metricsService:
    create: true

reportsController:
  enabled: true
  container:
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      capabilities:
        drop: [ALL]
      seccompProfile:
        type: RuntimeDefault
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi
  metricsService:
    create: true

# Disable pre-delete hooks — they fail on clean installs because they reference
# the admission-controller ServiceAccount before the chart creates it.
# Webhook cleanup is handled by the resync nuke phase instead.
webhooksCleanup:
  enabled: false

grafana:
  enabled: false
