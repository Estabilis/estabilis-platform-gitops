# ACR login server — injected by platform-root template from
# global.sharedAcrLoginServer (Terraform → ConfigMap → helm parameter).
acrLoginServer: ""

# Name of the ClusterSecretStore this component's ExternalSecrets read
# from. Default `platform-secret-store` matches the single-store form
# provisioned by `components/cluster-secret-store` (legacy mode), so
# existing deployments continue to work unchanged.
#
# Override when the 4 KV secrets this component consumes
# (`acr-shared-sp-client-id`, `acr-shared-sp-client-secret`,
# `acr-shared-token`, and `image-updater-git-pat`) live in a Key Vault
# distinct from the platform KV. The target store must exist in the
# cluster (provision via `components/cluster-secret-store` multi-store
# mode) and the external-secrets MI must have `Key Vault Secrets User`
# on the backing Key Vault.
secretStoreName: platform-secret-store

# -----------------------------------------------------------------------------
# Credential source — two modes
# -----------------------------------------------------------------------------
# The component supports either:
#
# 1) Azure AD Service Principal (preferred) — `credentialMode: sp`
#    Reads two KV secrets (client_id, client_secret). The SP has `AcrPull`
#    RBAC role on the registry. ACR resolves the AAD identity and issues
#    access tokens covering the full pull surface (content/read AND
#    metadata/read) in a single call. Tag listing (`/v2/<repo>/tags/list`)
#    works because the AAD path doesn't rely on the client requesting
#    non-standard scopes — it uses Azure RBAC directly.
#
# 2) Repository-scoped token (legacy) — `credentialMode: token`
#    Reads ONE KV secret (the token password) and pairs it with a fixed
#    username. ACR scope-map tokens grant actions matching the exact
#    scope requested; Image Updater asks `:pull` and receives a token
#    with only `content/read`, so `tags/list` returns 401 because listing
#    tags requires `metadata/read`. Kept as a rollback path.
#
# Defaults to `sp` because tag listing must work for Image Updater.

credentialMode: sp

# Service Principal mode — two KV secrets populated by the
# `transfero-acr-shared-hml` Terraform when `image_updater_sp_enabled = true`.
sp:
  kvClientIdSecret: acr-shared-sp-client-id
  kvClientSecretSecret: acr-shared-sp-client-secret

# Token mode — legacy path, kept for rollback.
token:
  kvSecretName: acr-shared-token
  username: image-updater

# ArgoCD repo-creds Secret name — consumed by `argocd` repo-server to
# pull OCI Helm charts from this same ACR. Always rendered when
# `acrLoginServer` is set; harmless if no Application pulls charts.
repoCreds:
  secretName: cred-acr-shared-charts

# Image Updater — Git write-back credentials (HTTPS Basic). Separate
# KV secret because git push is unrelated to ACR pull. Consumer
# Application references the rendered Secret via:
#   argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/<secretName>
#
# Enabled by default — a deployment that runs Image Updater typically
# also needs write-back to the gitops repo. Opt out (`enabled: false`)
# for deployments that only read from the ACR and don't push back,
# OR if the KV secret `image-updater-git-pat` is not populated. WIF
# migration follow-up: estabilis-platform-tools#160.
gitCreds:
  enabled: true
  secretName: image-updater-git-creds
  # KV secret name created by `transfero-acr-shared-hml` Terraform
  # (image_updater_git_pat variable).
  kvSecretName: image-updater-git-pat
  # PAT doesn't care about username — ADO accepts any non-empty value.
  # Convention: use the PAT owner or a recognizable identity.
  username: image-updater
