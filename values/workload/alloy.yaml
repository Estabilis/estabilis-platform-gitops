# Workload Alloy — base chart values.
#
# Push URLs are injected via environment variables by the workload-bootstrap
# ApplicationSet template (derived from bridge annotations). The River config
# below reads them with sys.env() — no hardcoded URLs anywhere.
#
# Client gitops overrides can add extra scrape targets or relabel rules
# without duplicating the full config.
#
# All values here must pass Kyverno policies (require-image-digest,
# require-limits, require-run-as-nonroot, drop-all-capabilities,
# require-seccomp-profile, no-privilege-escalation) and PodSecurity baseline.

commonLabels:
  estabilis.io/component: alloy

# --- Images pinned by digest (require-image-digest policy) ---
image:
  digest: "sha256:91b90e5d90f092affb2db04f973a59d15740e47a3b33932756fca6f53ffbdd39"

configReloader:
  image:
    digest: "sha256:6bfe763f260e3dda51615147b1fb9e2cac3ca2c53ad9825c7b5a11935b328a8a"
  resources:
    requests:
      cpu: 10m
      memory: 50Mi
    limits:
      cpu: 100m
      memory: 128Mi
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]
    seccompProfile:
      type: RuntimeDefault

# --- Main Alloy container ---
alloy:
  clustering:
    enabled: true
  # Workload Alloy does NOT need privileged or root (no eBPF profiling —
  # that's hub-only). loki.source.kubernetes reads logs via the K8s API
  # (kubelet /containerLogs), not from /var/log. Runs as non-root,
  # compatible with PodSecurity "baseline" and all Kyverno policies.
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: [ALL]
    seccompProfile:
      type: RuntimeDefault
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  configMap:
    content: |
      // =================================================================
      // Workload Alloy — logs + metrics → hub platform
      // =================================================================
      // Push URLs come from environment variables injected by the
      // workload-bootstrap ApplicationSet (derived from bridge annotations).
      // LOKI_PUSH_URL, MIMIR_PUSH_URL, CLUSTER_NAME are always set.

      // --- Log collection (all pods → hub Loki) ---
      discovery.kubernetes "pods" {
        role = "pod"
      }

      loki.source.kubernetes "pod_logs" {
        targets    = discovery.kubernetes.pods.targets
        forward_to = [loki.write.hub.receiver]
      }

      loki.write "hub" {
        endpoint {
          url = sys.env("LOKI_PUSH_URL")
        }
        external_labels = {
          cluster = sys.env("CLUSTER_NAME"),
        }
      }

      // --- Metrics: kube-state-metrics ---
      prometheus.scrape "kube_state_metrics" {
        targets = [{
          __address__ = "kube-state-metrics.kube-state-metrics.svc.cluster.local:8080",
        }]
        forward_to = [prometheus.relabel.kube_state_metrics.receiver]
        clustering {
          enabled = true
        }
      }

      prometheus.relabel "kube_state_metrics" {
        rule {
          target_label = "job"
          replacement  = "kube-state-metrics"
        }
        forward_to = [prometheus.remote_write.hub.receiver]
      }

      // --- Metrics: node-exporter ---
      discovery.kubernetes "node_exporter" {
        role = "pod"
        namespaces {
          names = ["node-exporter"]
        }
      }

      discovery.relabel "node_exporter" {
        targets = discovery.kubernetes.node_exporter.targets

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          action        = "keep"
          regex         = "prometheus-node-exporter"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_ip"]
          target_label  = "__address__"
          replacement   = "$1:9100"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }
      }

      prometheus.scrape "node_exporter" {
        targets    = discovery.relabel.node_exporter.output
        forward_to = [prometheus.relabel.node_exporter.receiver]
        clustering {
          enabled = true
        }
      }

      prometheus.relabel "node_exporter" {
        rule {
          target_label = "job"
          replacement  = "node-exporter"
        }
        forward_to = [prometheus.remote_write.hub.receiver]
      }

      // --- Metrics: kubelet ---
      discovery.kubernetes "nodes" {
        role = "node"
      }

      discovery.relabel "kubelet" {
        targets = discovery.kubernetes.nodes.targets

        rule {
          target_label = "__address__"
          replacement  = "kubernetes.default.svc.cluster.local:443"
        }

        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          regex         = "(.+)"
          target_label  = "__metrics_path__"
          replacement   = "/api/v1/nodes/$1/proxy/metrics"
        }
      }

      prometheus.scrape "kubelet" {
        targets      = discovery.relabel.kubelet.output
        scheme       = "https"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          insecure_skip_verify = true
        }
        forward_to = [prometheus.relabel.kubelet.receiver]
        clustering {
          enabled = true
        }
      }

      prometheus.relabel "kubelet" {
        rule {
          target_label = "job"
          replacement  = "kubelet"
        }
        forward_to = [prometheus.remote_write.hub.receiver]
      }

      // --- Metrics: cAdvisor ---
      discovery.relabel "cadvisor" {
        targets = discovery.kubernetes.nodes.targets

        rule {
          target_label = "__address__"
          replacement  = "kubernetes.default.svc.cluster.local:443"
        }

        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          regex         = "(.+)"
          target_label  = "__metrics_path__"
          replacement   = "/api/v1/nodes/$1/proxy/metrics/cadvisor"
        }
      }

      prometheus.scrape "cadvisor" {
        targets      = discovery.relabel.cadvisor.output
        scheme       = "https"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          insecure_skip_verify = true
        }
        forward_to = [prometheus.relabel.cadvisor.receiver]
        clustering {
          enabled = true
        }
      }

      prometheus.relabel "cadvisor" {
        rule {
          target_label = "job"
          replacement  = "cadvisor"
        }
        forward_to = [prometheus.remote_write.hub.receiver]
      }

      // --- Metrics: annotation-discovered client pods ---
      discovery.kubernetes "client_pods" {
        role = "pod"
      }

      discovery.relabel "client_pods" {
        targets = discovery.kubernetes.client_pods.targets

        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
          regex         = "true"
          action        = "keep"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_port"]
          target_label  = "__address__"
          regex         = "(.+)"
          replacement   = "${1}:$0"
          action        = "replace"
        }
      }

      prometheus.scrape "client_pods" {
        targets    = discovery.relabel.client_pods.output
        forward_to = [prometheus.remote_write.hub.receiver]
        clustering {
          enabled = true
        }
      }

      // --- Remote write to hub Mimir ---
      prometheus.remote_write "hub" {
        external_labels = {
          cluster = sys.env("CLUSTER_NAME"),
        }
        endpoint {
          url = sys.env("MIMIR_PUSH_URL")
        }
      }

controller:
  type: "daemonset"

tolerations:
  - key: "kubernetes.azure.com/scalesetpriority"
    operator: "Equal"
    value: "spot"
    effect: "NoSchedule"
