{{- $dnsProvider := .Values.global.dnsProvider | default .Values.global.provider -}}
{{- if eq $dnsProvider "cloudflare" }}
{{- if .Values.global.cloudflareApiToken }}
{{- /* Hub path: token injected directly via helm parameter. */ -}}
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
  {{- include "estabilis.metadata" . | nindent 2 }}
type: Opaque
stringData:
  api-token: {{ .Values.global.cloudflareApiToken | quote }}
{{- else }}
{{- /* Workload path: token in workload Key Vault, read by ExternalSecrets. */ -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
  {{- include "estabilis.metadata" . | nindent 2 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: cloudflare-api-token
{{- end }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
  {{- include "estabilis.metadata" . | nindent 2 }}
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ .Values.global.letsencryptEmail | quote }}
    privateKeySecretRef:
      name: letsencrypt-production-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
{{- end }}
