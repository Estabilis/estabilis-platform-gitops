---
# =============================================================================
# cnpg-system namespace
# Needs broad egress: Azure Blob for WAL backup
# Ingress: webhook, operator status, replication, postgres clients
# =============================================================================
{{- if (index .Values.policies "cnpg-system").enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cnpg-system
  namespace: cnpg-system
  {{- include "estabilis.metadata" . | nindent 2 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Webhook callbacks from API server (mutating/validating admission)
    - ports:
        - protocol: TCP
          port: 9443
    # Intra-namespace: operator → postgres status API (8000),
    # replication between primary and replicas (5432)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
    # PostgreSQL clients from grafana namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: grafana
      ports:
        - protocol: TCP
          port: 5432
  egress:
{{ include "network-policies.dns-egress" . }}
    # All egress (Azure Blob for WAL backup)
    - to: []
{{- end }}
---
# =============================================================================
# kyverno namespace
# Needs broad egress: kubernetes API for webhooks
# Ingress: all (webhook callbacks from API server)
# =============================================================================
{{- if .Values.policies.kyverno.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kyverno
  namespace: kyverno
  {{- include "estabilis.metadata" . | nindent 2 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # All ingress (webhook callbacks from API server, source IP unpredictable)
    - from: []
  egress:
{{ include "network-policies.dns-egress" . }}
    # All egress (kubernetes API for webhooks)
    - to: []
{{- end }}
---
# =============================================================================
# traefik namespace
# Egress: DNS, grafana namespace (backend routing)
# Ingress: all (Azure Load Balancer, external traffic)
# =============================================================================
{{- if .Values.policies.traefik.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik
  namespace: traefik
  {{- include "estabilis.metadata" . | nindent 2 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # All ingress (Azure Load Balancer, external traffic)
    - from: []
  egress:
{{ include "network-policies.dns-egress" . }}
    # Traefik is an ingress controller and needs broad egress:
    # - Kubernetes API server (watches IngressRoute/Ingress/Middleware
    #   CRDs, reads pod metadata for the OTel tracer)
    # - Any backend service in any namespace (routing — the whole
    #   point of an ingress controller)
    # - External endpoints (ACME TLS-ALPN challenges, upstream
    #   services behind an IngressRoute)
    #
    # Before this was added the policy only allowed DNS + the grafana
    # namespace. On clusters with a NetworkPolicy-enforcing CNI
    # (e.g. Cilium via ACNS), Traefik could not reach the Kubernetes
    # API server and every informer timed out with
    # "timed out waiting for controller caches to sync *v1.Ingress".
    # Matches the `allow-velero`/`allow-opencost` pattern below.
    - to: []
{{- end }}
---
