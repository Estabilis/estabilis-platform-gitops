{{- /*
  Traefik ingress controller for workload clusters.

  Provides the IngressClass consumed by exposure charts (ADR 0014).
  Uses the upstream Traefik Helm chart with workload-specific values
  (scheduling, resources, Azure LB annotations).

  Opt-in toggle: components.traefik
  Sync-wave 7 — before ingress charts (wave 9) so IngressClass + CRDs exist.
*/ -}}
{{- if index .Values.components "traefik" }}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: traefik
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            {{- toYaml .Values.clusterSelector.matchLabels | nindent 12 }}
  template:
    metadata:
      name: "traefik-{{ `{{ .name }}` }}"
      annotations:
        argocd.argoproj.io/sync-wave: "7"
      labels:
        estabilis.io/workload-cluster: "{{ `{{ .name }}` }}"
    spec:
      project: workload-baseline
      sources:
        - repoURL: https://traefik.github.io/charts
          chart: traefik
          targetRevision: "39.0.5"
          helm:
            releaseName: "traefik"
            valueFiles:
              - $values/values/workload/traefik.yaml
              {{- include "workload-bootstrap.overrideValueFile" (dict "component" "traefik" "root" $) | nindent 14 }}
              {{- include "workload-bootstrap.gitopsValueFile" (dict "component" "traefik" "root" $) | nindent 14 }}
            ignoreMissingValueFiles: true
            parameters:
              {{- include "workload-bootstrap.provenanceParameters" $ | nindent 14 }}
        - repoURL: {{ .Values.repoURL | quote }}
          targetRevision: {{ .Values.repoVersion | quote }}
          ref: values
        {{- include "workload-bootstrap.overrideSource" . | nindent 8 }}
        {{- include "workload-bootstrap.gitopsSource" . | nindent 8 }}
      destination:
        server: "{{ `{{ .server }}` }}"
        namespace: "traefik"
      syncPolicy:
        {{- include "workload-bootstrap.managedNamespaceMetadata" . | nindent 8 }}
        automated:
          selfHeal: true
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - CreateNamespace=true
{{- end }}
